[bm_collector]
# Collector logs are written to stderr by the scripted input.
# Key=value pairs are auto-extracted by Splunk's KV_MODE.
SHOULD_LINEMERGE = false
TIME_FORMAT      = %Y-%m-%d %H:%M:%S
TIME_PREFIX      = ^
MAX_TIMESTAMP_LOOKAHEAD = 20
KV_MODE          = auto
REPORT-bm_level  = bm_extract_level

# Useful searches:
#   index=_internal sourcetype=bm_collector action=run_end
#   index=_internal sourcetype=bm_collector action=check_failed
#   index=_internal sourcetype=bm_collector service_status=error

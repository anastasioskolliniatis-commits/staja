# ─────────────────────────────────────────────────────────────────────────────
# Vigil — Pre-built alert saved searches
#
# All alerts are DISABLED by default. Enable them in:
#   Settings → Searches, Reports, and Alerts → (search name) → Edit
#
# Configure notification actions (email, webhook, PagerDuty etc.) there too.
# Runs every 5 minutes, aligned with the collector interval.
# ─────────────────────────────────────────────────────────────────────────────

# ── Critical services ─────────────────────────────────────────────────────────
# Fires when any service transitions to CRITICAL status.
[Vigil - Critical Service Alert]
search = index=_internal sourcetype=bm_collector action=check_ok service_status=critical \
| rex field=_raw "node_id=(?P<node_id>\S+)" \
| rex field=_raw "service_name=(?P<service_name>\S+)" \
| rex field=_raw "service_status=(?P<service_status>\S+)" \
| stats count by node_id, service_name, service_status
description = Fires when the Vigil collector detects one or more CRITICAL services. \
Configure notification actions (email/webhook) after enabling.
cron_schedule = */5 * * * *
dispatch.earliest_time = -6m
dispatch.latest_time   = now
enableSched   = 0
alert_type    = number of events
alert_comparator = greater than
alert_threshold  = 0
alert.track   = 1
alert.severity = 4
realtime_schedule = 0

# ── Warning services ──────────────────────────────────────────────────────────
[Vigil - Warning Service Alert]
search = index=_internal sourcetype=bm_collector action=check_ok service_status=warning \
| rex field=_raw "node_id=(?P<node_id>\S+)" \
| rex field=_raw "service_name=(?P<service_name>\S+)" \
| rex field=_raw "service_status=(?P<service_status>\S+)" \
| stats count by node_id, service_name, service_status
description = Fires when the Vigil collector detects one or more WARNING services.
cron_schedule = */15 * * * *
dispatch.earliest_time = -16m
dispatch.latest_time   = now
enableSched   = 0
alert_type    = number of events
alert_comparator = greater than
alert_threshold  = 0
alert.track   = 1
alert.severity = 3
realtime_schedule = 0

# ── Collector stopped running ─────────────────────────────────────────────────
# Fires if no collector run has completed in the last 15 minutes —
# indicates the scripted input may have failed or Splunk restarted.
[Vigil - Collector Heartbeat]
search = index=_internal sourcetype=bm_collector action=run_end earliest=-15m \
| stats count
| where count = 0
description = Fires when the Vigil collector has not completed a run in 15 minutes. \
Check the scripted input is enabled and passAuth=splunk-system-user is set.
cron_schedule = */15 * * * *
dispatch.earliest_time = -16m
dispatch.latest_time   = now
enableSched   = 0
alert_type    = number of events
alert_comparator = greater than
alert_threshold  = 0
alert.track   = 1
alert.severity = 4
realtime_schedule = 0

# ── No data detected ─────────────────────────────────────────────────────────
# Fires when services that previously returned data now return nothing —
# could indicate a data feed outage.
[Vigil - No Data Alert]
search = index=_internal sourcetype=bm_collector action=check_ok service_status=no_data \
| rex field=_raw "node_id=(?P<node_id>\S+)" \
| rex field=_raw "service_name=(?P<service_name>\S+)" \
| stats count by node_id, service_name
description = Fires when one or more services return no data — possible feed outage.
cron_schedule = */15 * * * *
dispatch.earliest_time = -16m
dispatch.latest_time   = now
enableSched   = 0
alert_type    = number of events
alert_comparator = greater than
alert_threshold  = 0
alert.track   = 1
alert.severity = 3
realtime_schedule = 0

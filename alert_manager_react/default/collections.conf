[incidents]
field.incident_id   = string
field.title         = string
field.description   = string
field.severity      = string
field.status        = string
field.assigned_to   = string
field.assigned_role = string
field.created_by    = string
field.source_alert  = string
field.created_time  = number
field.updated_time  = number
field.resolved_time = number
accelerated_fields.by_status      = {"status": 1}
accelerated_fields.by_incident_id = {"incident_id": 1}

[incident_comments]
field.incident_id  = string
field.author       = string
field.comment      = string
field.timestamp    = number
field.status_change = string
accelerated_fields.by_incident = {"incident_id": 1}

[incident_counter]
field.counter = number

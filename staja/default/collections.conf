[bm_tree_config]
# Stores the SPL query that defines the node hierarchy
# Fields: tree_spl (string)

[bm_services]
# One document per service (query group) definition.
# service_spl    — SPL that returns rows, each with a service_status field
#                  (ok / warning / critical). Collector takes worst across rows.
# display_fields — JSON array of field names to show as columns in the drill-down
#                  right panel. Order matters. e.g. ["job_name","lag_min","error_count"]
# status_field   — field name driving status aggregation (default: service_status)
field.service_name        = string
field.service_description = string
field.service_spl         = string
field.display_fields      = string
field.status_field        = string

[bm_mappings]
# One document per node-service mapping (leaf nodes only)
field.node_id      = string
field.service_name = string

[bm_results]
# Written by the collector every run. Read by React for tree status colors.
# Drill-down detail is NOT stored here — it fires live on click.
field.node_id          = string
field.service_name     = string
field.service_status   = string
field.last_checked_time = string
field.run_id           = string
field.error_message    = string
field.row_count        = number

[bm_run_log]
# One document per collector run — observability
field.run_id           = string
field.run_start_time   = string
field.run_duration_sec = number
field.run_success_count = number
field.run_error_count  = number

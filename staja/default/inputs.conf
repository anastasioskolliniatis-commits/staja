# ── Vigil: first-run initialisation ──────────────────────────────────────────
# Seeds bm_tree_config with the default CSV tree SPL if not already set.
# Runs once per day; no-op after first successful seed.
[script://./bin/bm_init.py]
interval    = 86400
sourcetype  = bm_init
index       = _internal
passAuth    = splunk-system-user
disabled    = false

# ── Vigil: status collector ───────────────────────────────────────────────────
# Runs all configured service SPLs and writes results to bm_results KV.
# Disable here and re-enable in local/inputs.conf after the app is configured,
# or leave enabled — it exits gracefully if no services are mapped yet.
[script://./bin/bm_collector.py]
interval    = 300
sourcetype  = bm_collector
index       = _internal
passAuth    = splunk-system-user
disabled    = false

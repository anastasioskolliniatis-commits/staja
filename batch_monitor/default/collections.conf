[bm_tree_config]
# Stores the SPL query that defines the node hierarchy
# Fields: tree_query (string)

[bm_services]
# One document per service definition
# Fields: name, description, spl_query
field.name = string
field.description = string
field.spl_query = string

[bm_mappings]
# One document per host-service mapping
# Fields: host_id, service_name
field.host_id = string
field.service_name = string

[bm_results]
# Written by the collector saved search, read by the React app
# Fields: host_id, service_name, status, last_checked
field.host_id = string
field.service_name = string
field.status = string
field.last_checked = string

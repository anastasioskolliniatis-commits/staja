[bm_tree_config]
# Stores the SPL query that defines the node hierarchy
# Fields: tree_spl (string)

[bm_services]
# One document per service definition
field.service_name = string
field.service_description = string
field.service_spl = string

[bm_mappings]
# One document per node-service mapping
field.node_id = string
field.service_name = string

[bm_results]
# Written by the collector, read by the React app
field.node_id = string
field.service_name = string
field.service_status = string
field.last_checked_time = string
field.run_id = string
field.error_message = string

[bm_run_log]
# One document per collector run — observability
field.run_id = string
field.run_start_time = string
field.run_duration_sec = number
field.run_success_count = number
field.run_error_count = number

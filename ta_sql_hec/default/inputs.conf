# ── Straja: SQL HEC Input ─────────────────────────────────────────────────────
# After installing this add-on:
#   1. Go to Settings → Data Inputs → HTTP Event Collector
#   2. Create or copy your HEC token and paste it below in local/inputs.conf
#   3. Set disabled = false
#
# Create local/inputs.conf with:
#   [http://sql_hec]
#   token = <your-hec-token>
#   disabled = false

[http://sql_hec]
token = 00000000-0000-0000-0000-000000000000
index = main
sourcetype = SQL
disabled = true
